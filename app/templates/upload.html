{% extends "base.html" %}

{% block title %}New Document - Document Manager{% endblock %}

{% block content %}
<div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
    <h1>Create New Document</h1>
    <a href="{{ url_for('home') }}" class="btn btn-secondary">Back to All Documents</a>
</div>

<form method="POST" action="{{ url_for('upload_pdfs') }}" enctype="multipart/form-data">
    <div class="form-group">
        <label for="pdf_folder">Select PDF Folder:</label>
        <input type="file" name="pdf_files" id="pdf_files" multiple accept=".pdf">
        <!-- <input type="text" id="pdf_folder" name="pdf_folder" placeholder="Enter folder path containing PDFs" required> -->
        <small style="color: #666;">Paste the full path to the folder containing your PDF files.</small>
    </div>
    <div style="margin-top: 20px;">
        <button type="submit" class="btn btn-primary">Upload PDFs to ChromaDB</button>
        <!-- <a href="{{ url_for('upload_pdfs') }}" class="btn btn-secondary">Cancel</a> -->
    </div>
</form>
{% endblock %}
