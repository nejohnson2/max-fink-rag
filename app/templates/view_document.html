<!-- templates/view_document.html -->
{% extends "base.html" %}

{% block title %}{{ document.metadata.source or 'Untitled' }} - View Document{% endblock %}

{% block content %}
<div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
    <h1>{{ document.metadata.source or 'Untitled Document' }}</h1>
    <div>
        <a href="{{ url_for('home') }}" class="btn btn-secondary">Back to All Documents</a>
    </div>
</div>

<div class="document-meta" style="margin-bottom: 20px; padding: 12px; background: #f8f9fa; border-radius: 4px;">
    <strong>Document ID:</strong> {{ document.metadata.doc_id }}<br>
</div>
<div><!-- Option 1: iframe -->
    <iframe src="{{ url_for('serve_pdf', filename=document_source) }}"
            width="100%" height="800px">
    </iframe>
</div>



{% endblock %}
